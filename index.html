<!DOCTYPE html>
<html>
<head>
  <title>GizmozV2 AI</title>
  <style>
    body { background:#0f0f0f; color:white; font-family:sans-serif; padding:20px; }
    #chat { height:300px; overflow:auto; border:1px solid #333; padding:10px; margin-bottom:10px; }
    input, textarea, select { width:100%; padding:10px; margin-top:5px; background:#111; color:white; border:1px solid #333; }
    button { padding:10px; margin-top:5px; background:#222; color:white; border:none; cursor:pointer; }
    button:hover { background:#333; }
    pre { background:#111; padding:10px; overflow:auto; }
  </style>
</head>
<body>

<h2>🤖 GizmozV2 AI</h2>
<select id="mode">
  <option value="chat">💬 Chat</option>
  <option value="web">🌐 Website AI</option>
  <option value="creative">🎬 Creative AI</option>
</select>

<div id="chat"></div>
<input id="input" placeholder="Ask GizmozV2...">
<button onclick="send()">Send</button>

<script>
const apiKey = "YOUR_OPENAI_KEY"; // replace with your OpenAI key
let trainingData = JSON.parse(localStorage.getItem("gizmozTraining")) || [];

async function send() {
  const input = document.getElementById("input").value;
  const mode = document.getElementById("mode").value;
  const chat = document.getElementById("chat");

  chat.innerHTML += "<div>> " + input + "</div>";

  // Combine training data into prompt
  let prompt = "You are GizmozV2 AI. Be helpful and use the training data:\n";
  trainingData.forEach(d => prompt += `User: ${d.input}\nAI: ${d.output}\n`);
  prompt += `User: ${input}\nAI:`;

  // Mode adjustments
  if(mode === "web") prompt += " Generate a homepage in JSON format.";
  if(mode === "creative") prompt += " Generate animation JSON output.";

  const response = await fetch("https://api.openai.com/v1/completions", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + apiKey
    },
    body: JSON.stringify({
      model: "text-davinci-003",
      prompt: prompt,
      temperature: 0.7,
      max_tokens: 300
    })
  });

  const data = await response.json();
  const text = data.choices[0].text.trim();

  chat.innerHTML += "<div>GizmozV2: <pre>" + text + "</pre></div>";
  chat.scrollTop = chat.scrollHeight;
  document.getElementById("input").value = "";
}

// Add a simple training function
function train(input, output){
  trainingData.push({input, output});
  localStorage.setItem("gizmozTraining", JSON.stringify(trainingData));
}
</script>

</body>
</html>
